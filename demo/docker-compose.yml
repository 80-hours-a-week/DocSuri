name: docsuri-demo

# Phase 0 walking-skeleton compose — AGENTS.md §5 아키텍처를 로컬 컨테이너로 매핑.
# RDS/ElastiCache/SNS/SQS는 여기서는 로컬 전용(LocalStack + pgvector + redis)으로
# 둔다. 프로덕션 전환은 EKS 스프린트에서 처리한다.
#
# 서비스:
#   postgres   — RDS 대체. pgvector 이미지에 확장이 미리 포함됨.
#   redis      — ElastiCache 대체. Celery 브로커 + SlowAPI 저장소 + §4.1 캐시.
#   localstack — §5.3 메시징용 SNS/SQS 로컬 에뮬레이션.
#   api        — FastAPI 앱 (본 저장소의 `app.main:app`).
#   worker     — Celery 워커 (기본 큐).
#   beat       — Celery beat (#04 모니터링 cron 트리거).
#
# 기동:        docker compose up --build
# 상태 초기화: docker compose down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: docsuri
      POSTGRES_PASSWORD: docsuri
      POSTGRES_DB: docsuri
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsuri -d docsuri"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sns,sqs,secretsmanager
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - localstackdata:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://docsuri:docsuri@postgres:5432/docsuri
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/3
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.infra.celery.app", "worker", "-l", "INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://docsuri:docsuri@postgres:5432/docsuri
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.infra.celery.app", "beat", "-l", "INFO"]
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  localstackdata:
