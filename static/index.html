<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocSuri Summary & Translation</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>DocSuri</h1>
          <p>논문 요약 & span 번역 데모</p>
        </div>
        <label>
          Paper
          <select id="paperSelect"></select>
        </label>
      </section>

      <section class="grid">
        <article class="panel paper-panel">
          <header>
            <h2 id="paperTitle">Paper</h2>
            <span id="status">Loading</span>
          </header>
          <pre id="paperText" class="paper-text"></pre>
        </article>

        <aside class="panel controls">
          <section>
            <h2>요약</h2>
            <label>
              길이
              <select id="lengthPreset">
                <option value="tldr">1줄 TL;DR</option>
                <option value="paragraph" selected>한 문단</option>
                <option value="page">한 페이지</option>
              </select>
            </label>
            <label>
              관점
              <select id="anglePreset">
                <option value="contribution">기여 중심</option>
                <option value="method">방법 중심</option>
                <option value="results">결과·실험 중심</option>
                <option value="critical">비판적 검토</option>
              </select>
            </label>
            <button id="summaryBtn">요약 생성</button>
            <div id="summaryOutput" class="output"></div>
          </section>

          <section>
            <h2>번역</h2>
            <textarea id="selectedText" rows="7" placeholder="왼쪽 본문에서 텍스트를 선택하면 여기에 들어옵니다."></textarea>
            <button id="translateBtn">선택 span 번역</button>
            <div id="translationOutput" class="output"></div>
          </section>

          <section>
            <h2>Glossary</h2>
            <div id="glossaryOutput" class="glossary"></div>
          </section>
        </aside>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
