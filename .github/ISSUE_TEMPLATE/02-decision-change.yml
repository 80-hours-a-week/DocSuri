name: "결정 변경 요청"
description: "동결 문서(component-model · ADR · unit)의 변경 — handoff.md §6 4단계"
title: "[변경] "
labels: ["type:decision"]
body:
  - type: input
    id: target
    attributes:
      label: 대상 문서 / ID
      description: "예: ADR-D3, component-model §2.3, U0 §4"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 변경 사유
      description: 현재 결정이 왜 더 이상 유효하지 않은지
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 영향받는 unit · 문서 · 인터페이스 — units-overview.md §4 합의 표를 확인하세요
    validations:
      required: true
  - type: checkboxes
    id: process
    attributes:
      label: 절차 확인
      options:
        - label: handoff.md §6 4단계(프롬프트 → 계획 → 승인 → 동기 갱신)를 따른다
          required: true
        - label: 영향받는 unit owner들이 이 이슈에 멘션되었다
          required: true
