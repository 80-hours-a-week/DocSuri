# Release — automate commit→release. On every push to main (a merged develop→main promotion PR),
# compute the next semver from conventional commits, create the vX.Y.Z tag + GitHub Release, then
# deploy it by calling cd.yml as a reusable workflow. This replaces manual `v*` tagging: merging
# the promotion PR IS the release. Manual `v*` tag pushes still deploy (cd.yml keeps that trigger).
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create the tag + GitHub Release
  id-token: write # propagated to the reusable cd.yml for AWS OIDC assume-role
  actions: read # cd.yml's require-ci reads the CI run status via the API

# Never run two releases at once; never cancel an in-flight one (a deploy may be mid-rollout).
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Version + tag + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      released: ${{ steps.tag.outputs.new_tag != '' }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0 # full history so the tagger can read commits since the last tag

      # Conventional-commit → next semver + tag. Created with GITHUB_TOKEN, which by GitHub's
      # anti-recursion rule does NOT trigger cd.yml's push:tags — so the deploy below is the ONLY
      # deploy (no double-run). default_bump: patch → every promotion cuts at least a patch release.
      - name: Compute version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          tag_prefix: v
          default_bump: patch

      # Auto-generated notes (from merged PRs/commits) — do NOT interpolate commit text into the
      # shell (injection). Tag string comes via env, not inline expansion.
      - name: Publish GitHub Release
        if: steps.tag.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: gh release create "$NEW_TAG" --title "$NEW_TAG" --generate-notes --verify-tag

  deploy:
    name: Deploy the release
    needs: release
    if: needs.release.outputs.released == 'true'
    # Reusable call — no PAT needed. cd.yml runs in this push:main context, so its OIDC sub is
    # repo:.../ref:refs/heads/main; the CD role trust (cicd_stack.py) allows that sub.
    uses: ./.github/workflows/cd.yml
    secrets: inherit
