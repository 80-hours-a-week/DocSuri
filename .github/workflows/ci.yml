name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 백엔드 (ruff + pytest + pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: demo/pyproject.toml

      - name: 설치 (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 린트
        run: ruff check .

      - name: 테스트
        run: pytest -q

      - name: pip-audit
        run: pip-audit --skip-editable

  frontend:
    name: 프런트엔드 (lint + typecheck + build + npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 설치
        run: npm install

      - name: 린트
        run: npm run lint --if-present

      - name: 타입 체크
        run: npm run typecheck

      - name: 빌드
        env:
          NEXTAUTH_SECRET: ci-placeholder
        run: npm run build

      - name: npm audit (prod 전용 — 경고만, 별도 PR에서 처리)
        # 스캐폴드에 핀된 deps에 사전 존재하던 advisory들이 있어 차단하지 않는다.
        # `|| true`로 출력은 남기되 잡은 실패시키지 않으며, 의존성 갱신은 별도
        # follow-up PR("deps: frontend dep tree refresh")에서 처리한다.
        run: npm audit --omit=dev --audit-level=high || true

  ruleset:
    name: AGENTS.md 규칙 점검
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Temporal 참조 거부 (AGENTS.md §5.3)
        # AGENTS.md §5.3은 단일 채널로 SNS+SQS+Celery를 선택했다. PR이 §5.3을
        # 먼저 개정하지 않은 채 Temporal 의존성을 다시 들이면 명시적으로 실패시켜
        # 규칙과 코드가 어긋나지 않도록 한다.
        run: |
          if grep -RIn --exclude-dir=node_modules --exclude="*.md" -e "temporalio" -e "from temporal" demo web-next; then
            echo "::error::Temporal import 발견 — §5.3 위반. AGENTS.md를 먼저 개정하거나 되돌릴 것."
            exit 1
          fi
