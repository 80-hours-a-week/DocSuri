# First CI for DocSuri — closes the "no automated gate" finding (aidlc-state.md §검증 재기준선).
# One job per uv project (they are independent packages). Each runs lint + tests; `shared` also
# runs the schema drift guard so a stale _generated/ fails the PR. The repo-root tests/ suite
# (accounts U3 + library U4) runs in the `root-suites` job below; that job's lint step also gates
# the tests/ tree so unused-import (F401) debt can't reappear invisibly.
#
# Third-party actions are pinned to a commit SHA (not a mutable major tag) — a hijacked tag can't
# silently run in CI. The trailing `# vX` comment records the human-readable version. (audit Med #6)
name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so a rapid push train doesn't stack full CI runs. (audit Low #8)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    name: shared (SSOT · drift · pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: shared/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Schema drift guard (generated bindings match the SSOT)
        run: uv run python tools/generate.py --check
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest

  ingestion:
    name: ingestion (U1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest

  discovery:
    name: discovery (U2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/modules/discovery
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check .
      - name: Tests (incl. the api router extra)
        run: uv run --extra api pytest

  ops:
    name: ops (U6 reliability/detection)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ops
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest

  backend:
    name: backend app-shell (mounts U2/U3)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Lint
        run: uv run ruff check .
      - name: Tests (asserts discovery actually mounts)
        run: uv run pytest

  root-suites:
    name: accounts + library (root tests/ — U3 · U4)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      # Root tests/ (accounts U3 + library U4) import backend.modules.* and need the backend
      # env (incl. hypothesis + pytest-asyncio). Run from the repo root via the root pytest.ini
      # (pythonpath=. · asyncio_mode=auto). The accounts/library/ops module lanes self-lint with
      # their own ruff.toml (the app-shell ruff excludes modules/), so gate them here — plus the
      # root tests/ tree itself, which no other lane covered (ruff defaults catch F401 there).
      - name: Lint (accounts + library + ops modules + root tests/)
        run: uv run --project backend ruff check backend/modules/accounts backend/modules/library backend/modules/ops tests
      - name: Tests (accounts + library)
        run: uv run --project backend pytest tests -c pytest.ini

  frontend:
    name: frontend (U5 · tsc + vitest + type drift + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm exec tsc --noEmit
      - name: Type drift guard (generated types match shared/ schemas)
        run: pnpm run gen:types && git diff --exit-code types/
      - name: Lint
        run: pnpm run lint
      - name: Tests
        run: pnpm exec vitest run
      # tsc + vitest don't webpack-compile the routes, so a build-only break (e.g. a
      # server-only module leaking into the client graph via the /bff route) passes both
      # yet fails `next build`. This step is the guard that actually compiles every route.
      - name: Build
        run: pnpm exec next build

  dependency-review:
    name: Dependency review (PR-only · npm + pip)
    # Reviews the PR's dependency-graph diff (pnpm + Python) and fails only on a NEWLY introduced
    # vulnerable dependency — closes the frontend-deps-unscanned gap without blocking on
    # pre-existing debt. Public repo, so no Advanced Security needed. PR-only (no base ref on push).
    # (audit Med #5)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high

  security:
    name: Security Scan (SCA + Secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Run pip-audit on Backend
        run: |
          uv pip compile backend/pyproject.toml -o backend/requirements.txt
          # drop first-party editable path deps (not on PyPI; their third-party deps are already flattened in)
          grep -v '^-e ' backend/requirements.txt > backend/requirements.audit.txt
          uvx pip-audit -r backend/requirements.audit.txt
      - name: Run pip-audit on Ingestion
        run: |
          uv pip compile ingestion/pyproject.toml -o ingestion/requirements.txt
          # drop first-party editable path deps (not on PyPI; their third-party deps are already flattened in)
          grep -v '^-e ' ingestion/requirements.txt > ingestion/requirements.audit.txt
          uvx pip-audit -r ingestion/requirements.audit.txt
      - name: Run pip-audit on Ops
        run: |
          uv pip compile ops/pyproject.toml -o ops/requirements.txt
          # drop first-party editable path deps (not on PyPI; their third-party deps are already flattened in)
          grep -v '^-e ' ops/requirements.txt > ops/requirements.audit.txt
          uvx pip-audit -r ops/requirements.audit.txt
      # BLOCKING, license-free secret scan. The gitleaks-action v2 requires an org licence (why the
      # old step was continue-on-error/advisory), so run the gitleaks CLI over full history
      # (fetch-depth: 0 above) via its pinned image and fail on any finding. Add .gitleaks.toml to
      # allowlist false positives. (audit Med #4)
      - name: Gitleaks secret scan (blocking)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source /repo --redact -v --exit-code 1
