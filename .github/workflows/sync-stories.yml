name: Sync stories to issues

# Keeps GitHub issues in sync with aidlc-docs, the source of truth for
# requirements / design intent / stories (NOT for runtime/config state — that
# lives in code/CDK/live AWS; see reports/aidlc-ssot-audit-2026-07.md).
# Runs the idempotent stories -> issues upsert whenever stories.md changes on
# develop, or on manual dispatch. Create/update only -- never closes an issue
# (closing a shipped story stays a human decision).

on:
  push:
    branches: [develop]
    paths: ['aidlc-docs/inception/user-stories/stories.md']
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Upsert issues from stories.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 aidlc-docs/scripts/sync_stories_to_issues.py --apply
