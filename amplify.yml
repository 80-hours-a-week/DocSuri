# Amplify Hosting 빌드 스펙 — ADR-D5 (Next.js SSR, 모노레포 frontend/)
# 연결: env_setup_plan C-D2. BACKEND_URL은 Amplify 콘솔/CLI 환경 변수로 주입.
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # Amplify 함정: 콘솔 환경 변수는 빌드 컨테이너에만 주입되고 SSR 런타임
            # (WEB_COMPUTE)에는 자동 전파되지 않는다 — 빌드 시 .env.production으로
            # 구워 넣어야 BFF(performSearch)가 BACKEND_URL을 읽는다 (2026-06-12 실측).
            - env | grep -e BACKEND_URL >> .env.production || true
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
