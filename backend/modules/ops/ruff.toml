# U6 ops lane lint config (modules self-lint; the backend app-shell ruff excludes modules/).
# Mirrors the library/accounts lanes. B008 is suppressed because FastAPI's
# `param: T = Depends(...)` dependency-injection idiom is intentional — it is not the
# mutable-default function call that B008 targets.
line-length = 100

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]
