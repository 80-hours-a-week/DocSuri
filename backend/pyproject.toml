[project]
name = "docsuri-backend"
version = "0.1.0"
description = "DocSuri MVP backend — AI-DLC Construction, U0 Foundation부터 모듈러 모놀리스로 빌드"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "httpx>=0.27",
    "boto3>=1.34",
    "fastapi>=0.111",
    "uvicorn>=0.49.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docsuri"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
