[pytest]
# 리포지토리 루트를 sys.path에 추가해 `from backend.modules.accounts...` 임포트를 가능하게 한다.
# (backend/ 와 tests/ 에 __init__.py 가 없어, 이 설정이 없으면 `pytest tests/accounts -v` 가
#  ModuleNotFoundError: No module named 'backend' 로 전 테스트를 수집 단계에서 실패시킨다.)
pythonpath = .
testpaths = tests
# pytest-asyncio: @pytest.mark.asyncio 마커 없이도 async 테스트를 asyncio로 실행
asyncio_mode = auto
